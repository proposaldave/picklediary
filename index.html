<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PickleDiary</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg' fill='none'%3E%3Crect x='18' y='10' width='44' height='60' rx='3' stroke='%2382c341' stroke-width='3'/%3E%3Crect x='18' y='10' width='6' height='60' rx='2' fill='%2382c341' opacity='0.4'/%3E%3Ccircle cx='44' cy='40' r='6' fill='%23f0c674'/%3E%3C/svg%3E">
<meta name="description" content="PickleDiary — your private pickleball diary. It gets to know you — your game, your people, your energy.">
<meta property="og:title" content="PickleDiary — It gets to know you.">
<meta property="og:description" content="Your game. Your energy. Your people. A private pickleball diary that grows with you.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://picklediary.com">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="PickleDiary — It gets to know you.">
<meta name="twitter:description" content="Your game. Your energy. Your people. A private pickleball diary that grows with you.">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:#07070b;color:#e8e6e1;overflow-x:hidden;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.02'/%3E%3C/svg%3E");pointer-events:none;z-index:10}

nav{padding:1.5rem 2rem;display:flex;justify-content:space-between;align-items:center;position:relative;z-index:5}
.logo{font-family:'Playfair Display',serif;font-size:1.15rem;font-weight:700;letter-spacing:-0.02em}
.logo em{font-style:italic;color:#82c341}
.nav-contact{font-size:0.8rem;color:#444;text-decoration:none;transition:color 0.3s;padding:0.5rem 0}
.nav-contact:hover{color:#e8e6e1}

.page{max-width:620px;padding:0 2rem}

/* HERO */
.hero{min-height:100vh;display:flex;flex-direction:column;justify-content:center;position:relative}
.hero h1{font-family:'Playfair Display',serif;font-size:clamp(3rem,11vw,6.5rem);font-weight:700;line-height:1;letter-spacing:-0.04em;opacity:0;animation:up 1s ease 0.2s forwards}
.hero h1 em{font-style:italic;color:#82c341}
.hero .sub{font-family:'Playfair Display',serif;font-size:clamp(1rem,2.5vw,1.3rem);font-style:italic;color:#444;margin-top:1.5rem;opacity:0;animation:up 1s ease 0.6s forwards}
.hero::before{content:'';position:fixed;top:8%;right:-12%;width:500px;height:500px;background:radial-gradient(circle,rgba(130,195,65,0.03) 0%,transparent 70%);pointer-events:none}

/* STORY */
.people{padding:2rem 0 4rem}
.story-line{font-family:'Playfair Display',serif;font-size:clamp(1.1rem,3vw,1.5rem);line-height:1.65;color:#555;font-weight:400;margin-bottom:1.8rem}
.story-line strong{color:#e8e6e1;font-weight:700}

/* TURN */
.turn{padding:10rem 0 5rem}
.turn p{font-family:'Playfair Display',serif;font-size:clamp(1.5rem,4.5vw,2.2rem);line-height:1.4;color:#444;font-weight:400}
.turn p strong{color:#e8e6e1;font-weight:700}

/* RESOLVE */
.resolve{padding:3rem 0 2.5rem;border-top:1px solid #1a1a24}
.resolve-name{font-family:'Playfair Display',serif;font-size:clamp(2.2rem,8vw,4.5rem);font-weight:700;letter-spacing:-0.03em;margin-bottom:0.8rem}
.resolve-name em{font-style:italic;color:#82c341}
.resolve-tagline{font-family:'Playfair Display',serif;font-size:clamp(0.95rem,2.5vw,1.3rem);font-style:italic;color:#5a5a68;margin-bottom:1rem}
.resolve-desc{font-size:clamp(0.9rem,2.5vw,1rem);color:#555;line-height:1.8;font-weight:300;max-width:480px;margin-bottom:2.5rem}
.resolve-desc strong{color:#999;font-weight:400}

/* LEVELS */
.levels{padding:2rem 0 3rem;border-top:1px solid #1a1a24}
.levels-title{font-family:'Playfair Display',serif;font-size:clamp(1.1rem,2.5vw,1.4rem);font-weight:700;color:#e8e6e1;margin-bottom:0.4rem}
.levels-sub{font-size:0.82rem;color:#444;margin-bottom:2rem}
.level{display:flex;align-items:baseline;gap:1rem;margin-bottom:1.5rem;padding-left:0.5rem}
.level-num{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:700;flex-shrink:0;width:2rem;text-align:right}
.level-num.l1{color:#F472B6}
.level-num.l2{color:#FBBF24}
.level-num.l3{color:#34D399}
.level-num.l4{color:#4da2ff}
.level-content{}
.level-name{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;color:#e8e6e1;margin-bottom:0.2rem}
.level-desc{font-size:0.8rem;color:#555;line-height:1.6;font-weight:300}

/* HOW IT WORKS */
.how{padding:2rem 0 3rem;border-top:1px solid #1a1a24}
.how-title{font-family:'Playfair Display',serif;font-size:clamp(1.1rem,2.5vw,1.4rem);font-weight:700;color:#e8e6e1;margin-bottom:1.5rem}
.how-step{margin-bottom:1.5rem}
.how-label{font-size:0.85rem;font-weight:700;color:#82c341;margin-bottom:0.3rem}
.how-text{font-size:0.85rem;color:#555;line-height:1.6;font-weight:300}

/* CONTACT */
.contact{padding:2.5rem 0}
.contact a{font-size:0.85rem;color:#555;text-decoration:none;border-bottom:1px solid #1e1e2a;padding:0.5rem 0 0.25rem;transition:all 0.3s;display:inline-block}
.contact a:hover{color:#82c341;border-color:#82c341}

footer{padding:3rem 2rem 2rem;font-size:0.6rem;color:#1e1e2a}

@keyframes up{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.reveal{opacity:0;transform:translateY(16px);transition:opacity 0.7s ease,transform 0.7s ease}
.reveal.visible{opacity:1;transform:translateY(0)}

@media(max-width:768px){
  nav{padding:1.2rem 1.5rem}.page{padding:0 1.5rem}
  .people{padding:1.5rem 0 3.5rem}.turn{padding:4rem 0}
  .resolve{padding:2.5rem 0 2rem}.hero{min-height:75vh}
  footer{padding:2.5rem 1.5rem 1.5rem}
}
@media(max-width:480px){
  nav{padding:1rem 1.2rem}.page{padding:0 1.2rem;max-width:100%}
  .hero{min-height:70vh}.hero h1{font-size:clamp(2.5rem,14vw,4rem)}
  .story-line{font-size:clamp(1rem,4vw,1.2rem);margin-bottom:1.5rem}
  .turn{padding:3.5rem 0}.turn p{font-size:clamp(1.3rem,5vw,1.8rem)}
  .resolve-name{font-size:clamp(2rem,10vw,3rem)}.resolve-desc{font-size:0.9rem}
  .contact a{font-size:0.9rem;padding:0.6rem 0 0.3rem}
  .people{padding:1rem 0 3rem}.resolve{padding:2rem 0 1.5rem}
  footer{padding:2rem 1.2rem 1.5rem}
}
@media(max-width:360px){.hero h1{font-size:2.3rem}.page{padding:0 1rem}nav{padding:0.8rem 1rem}}
</style>
</head>
<body>

<nav>
  <div class="logo">Pickle<em>Diary</em></div>
  <a id="nav-email" href="#" class="nav-contact">Contact</a>
</nav>

<div class="page">

  <!-- HERO -->
  <section class="hero">
    <h1>It gets to<br>know <em>you.</em></h1>
    <p class="sub">Your game. Your energy. Your people.</p>
  </section>

  <!-- PICKLEDIARY REVEAL -->
  <section class="resolve reveal">
    <div class="resolve-name">Pickle<em>Diary</em></div>
    <p class="resolve-tagline">Your private pickleball diary.</p>
    <p class="resolve-desc">The better it gets to know you, the more it helps.</p>
  </section>

  <div class="contact reveal">
    <a href="/chat.html" style="font-size:0.85rem;color:#82c341;text-decoration:none;border-bottom:1px solid #2a3a1e;padding:0.5rem 0 0.25rem;transition:all 0.3s;display:inline-block;margin-bottom:1.5rem">Try the diary →</a>
    <br>
    <a id="cta-email" href="#">Contact →</a>
  </div>

</div>

<footer>2026</footer>

<script>
var u='dave';var d='nepclub.com';var e=u+'@'+d;
document.getElementById('nav-email').href='mail'+'to:'+e;
document.getElementById('cta-email').href='mail'+'to:'+e;
var obs=new IntersectionObserver(function(entries){
  entries.forEach(function(e){if(e.isIntersecting){e.target.classList.add('visible');obs.unobserve(e.target)}})
},{threshold:0.15});
document.querySelectorAll('.reveal').forEach(function(el){obs.observe(el)});
</script>

</body>
</html>
